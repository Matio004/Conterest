{% extends 'base.html' %}
{% load post_tags %}
{% block title %}
	{{ config.title }}
{% endblock %}

{% block content %}
    <h1>{{ config.title }}</h1>
    <p>{{ config.publish }}</p>
    <img src="{{ config.image.url }}" alt="{{ config.title }}">
    <p><a href="{{ config.url }}" target="_blank">Github</a></p>
    {{ config.description|markdown }}
{% endblock %}
