{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mój Pinterest{% endblock %}</title>

    <link rel="icon" href="{% static "svg/favicon.svg" %}">

    <link href="{% static "css/base.css" %}" rel="stylesheet">
    <link href="{% static "css/form.css" %}" rel="stylesheet">
    <link href="{% static "css/list.css" %}" rel="stylesheet">
</head>
<body>
<header>
    <nav>
        <ul>
            <li>
                <img src="{% static "svg/logo.svg" %}" id="logo">
            </li>
            <li>
                <a href="{% url 'posts:posts' %}">Discover</a>
            </li>

            <li>

            </li>
        </ul>

        <ul class="user">
            {% if request.user.is_authenticated %}
                <li>Witaj, {{ request.user.first_name }}</li>
                <li>
                    <form action="{% url "logout" %}" method="post">
                        <input type="submit" value="Logout">
                        {% csrf_token %}
                    </form>
                </li>
            {% else %}
                <li><a href="{% url "login" %}" class="login">Login</a></li>
                <li><a href="{% url "register" %}" class="register">Register</a></li>
            {% endif %}
        </ul>
    </nav>
</header>
<div class="container">
    {% block content %}
    {% endblock %}
</div>
</body>
</html>
